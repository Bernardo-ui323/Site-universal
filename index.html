<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estelar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <div class="stars"></div>
    <nav class="nav-tabs">
        <div class="search-container"><input type="text" placeholder="Pesquisar..." id="searchBar"></div>
        <div class="buttons-container">
            <button class="tab-btn" onclick="openTab(event, 'inicio')">Início</button>
            <button class="tab-btn" onclick="openTab(event, 'tutoriais')">Aprender</button>
            <button class="tab-btn active" onclick="openTab(event, 'social')">Comunidade</button>
        </div>
    </nav>

    <main class="content">
        <div id="social" class="tab-content active">
            <div class="chat-container glass-card">
                <div id="chat-messages" class="chat-messages">
                    <div class="msg bot"><span>Sistema:</span> Canal pronto para transmissão.</div>
                </div>
                <div class="chat-controls">
                    <input type="text" id="chatInput" placeholder="Digite aqui...">
                    <button class="send-btn" onclick="sendMessage()">Enviar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ESTE BLOCO PRECISA ESTAR EXATAMENTE ASSIM
        const ably = new Ably.Realtime('B3N38A.XmB8Lg:6nK5GjU1YI6p5X0K'); 
        const channel = ably.channels.get('comunidade-ti');

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (input.value.trim() !== "") {
                channel.publish('message', input.value);
                input.value = '';
            }
        }

        channel.subscribe('message', function(msg) {
            const messageBox = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg user';
            div.innerHTML = `<span>Explorador:</span> ${msg.data}`;
            messageBox.appendChild(div);
            messageBox.scrollTop = messageBox.scrollHeight;
        });

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            document.getElementById(tabName).style.display = "block";
        }
    </script>
</body>
</html>
