<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estelar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>

    <div class="stars"></div>

    <nav class="nav-tabs">
        <div class="search-container">
            <input type="text" placeholder="Explorar cosmos..." id="searchBar">
        </div>
        <div class="buttons-container">
            <button class="tab-btn active" onclick="openTab(event, 'inicio')">Início</button>
            <button class="tab-btn" onclick="openTab(event, 'tutoriais')">Aprender</button>
            <button class="tab-btn" onclick="openTab(event, 'social')">Comunidade</button>
        </div>
    </nav>

    <main class="content">
        <div id="inicio" class="tab-content active">
            <h1>Painel de Controle</h1>
            <div class="grid-links">
                <a href="https://code.visualstudio.com/" target="_blank" class="glass-card">
                    <h3>VS Code</h3>
                    <p>Instalar editor de elite.</p>
                </a>
                <a href="https://github.com/" target="_blank" class="glass-card">
                    <h3>GitHub</h3>
                    <p>Hospedar sua frota de projetos.</p>
                </a>
            </div>
        </div>

        <div id="tutoriais" class="tab-content">
            <div class="video-grid">
                <div class="video-item">
                    <h3>Codando no VS Code</h3>
                    <iframe src="https://www.youtube.com/embed/1uofzbOfjTA" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="video-item">
                    <h3>IA na Programação</h3>
                    <iframe src="https://www.youtube.com/embed/itc13dM_M_4" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div id="social" class="tab-content">
            <div class="chat-container glass-card">
                <div class="chat-header">
                    <div class="status-dot"></div> Hub de Comunicação
                </div>
                <div id="chat-messages" class="chat-messages">
                    <div class="msg bot"><span>Sistema:</span> Conexão segura estabelecida.</div>
                </div>
                <div class="chat-controls">
                    <div class="chat-input-wrapper">
                        <label for="file-input" class="chat-icon">📎</label>
                        <input type="file" id="file-input" style="display:none" onchange="sendFileInfo()">
                        <input type="text" id="chatInput" placeholder="Mensagem...">
                        <button class="chat-icon" onclick="addEmoji('🚀')">🚀</button>
                    </div>
                    <button class="voice-btn" id="voiceBtn">🎤</button>
                    <button class="send-btn" onclick="sendMessage()">Enviar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // NAVEGAÇÃO ENTRE ABAS
        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].style.display = "none";
                contents[i].classList.remove("active");
            }
            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }
            document.getElementById(tabName).style.display = "block";
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // CHAT REAL (ABLY)
        const ably = new Ably.Realtime('B3N38A.XmB8Lg:6nK5GjU1YI6p5X0K'); 
        const channel = ably.channels.get('comunidade-ti');

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (input.value.trim() !== "") {
                channel.publish('message', input.value);
                input.value = '';
            }
        }

        channel.subscribe('message', function(msg) {
            const messageBox = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg user';
            div.innerHTML = `<span>Explorador:</span> ${msg.data}`;
            messageBox.appendChild(div);
            messageBox.scrollTop = messageBox.scrollHeight;
        });

        // INPUT EVENTS
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function addEmoji(emoji) { document.getElementById('chatInput').value += emoji; }

        function sendFileInfo() {
            const file = document.getElementById('file-input').files[0];
            if(file) channel.publish('message', `📎 Arquivo: ${file.name}`);
        }

        // ANIMAÇÃO MICROFONE
        const voiceBtn = document.getElementById('voiceBtn');
        voiceBtn.addEventListener('click', function() {
            this.classList.toggle('recording');
            const msg = this.classList.contains('recording') ? "🎤 Gravando áudio..." : "✅ Áudio enviado";
            channel.publish('message', msg);
        });
    </script>
</body>
</html>
